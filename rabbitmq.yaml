- name: Installing rabbitmq
  hosts: rabbitmq
  become: yes
  tasks:
  - name: Copying repo
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: install rabbitmq
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: present

  - name: enabling the starting the service
    ansible.builtin.service:
      name: rabbitmq-server
      enabled: yes
      state: present

  