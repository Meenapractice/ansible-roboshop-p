- name: Installing mysql
  hosts: mysql
  become: yes
  tasks:
  - name: Installing mysql
    ansible.builtin.dnf:
      name: mysql-server
      state: present

  - name: enabling and restarting the service
    ansible.builtin.service:
      name: mysqld
      enabled: yes
      state: restarted

  - name: changing the password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1