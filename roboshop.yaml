- name: Creating instance and r53 records
  hosts: all
  vars:
    sg_id: "sg-0e05551e762cffc74"
    ami_id: "ami-0220d79f3f480ecf5"
    env: dev
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: Creating ec2-instances
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }} - {{ env }}"
      tags:
        Project: "Roboshop"
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }} - {{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: Print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"