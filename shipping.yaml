- name: Installing shipping
  hosts: shipping
  become: yes
  tasks:
  - name: installing packages
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - maven
    - mysql  

  - name: creating system user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      comment: roboshop system user

  - name: deleting the directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: creating directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: deleting the code
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent

  - name: Dowloading the code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip 
      dest: /tmp/shipping.zip

  - name: Unsrachive the file
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: true

  - name: maven clean package
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app

  - name: moving the shipping code
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar 
    args:
      chdir: /app

  - name: creating the service file
    ansible.builtin.template:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service
    
  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: checking and loading data in db
    community.mysql.mysql_db:
       login_user: root
       login_password: RoboShop@1
       login_host: "{{ MYSQL_HOST }}"
       state: import
       target: "{{ item }}"
    loop:
       - /app/db/schema.sql
       - /app/db/app-user.sql 
       - /app/db/master-data.sql   

  - name: enable and restart the service
    ansible.builtin.service:
      name: shipping
      enabled: yes
      state: restarted


 

  
  
      

  
  
