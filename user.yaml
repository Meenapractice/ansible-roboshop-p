- name: Configuring user
  hosts: user
  become: yes
  tasks:
  - name: Enabling the nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: installing nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: creating system user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      comment: roboshop system user

  - name: deleting the directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: creating the directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Deleting the code
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: dowloading the code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

  - name: unarchive the code
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app

  - name: installing dependenices
    community.general.npm:
      path: /app

  - name: creating the service file
    ansible.builtin.template:
      src: user
      dest: /etc/systemd/system/user.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: enabling and starting the service
    ansible.builtin.service:
      name: user
      state: restarted
      enabled: yes

    