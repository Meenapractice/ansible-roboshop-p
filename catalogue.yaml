- name: Installing catalogue
  hosts: catalogue
  become: yes
  tasks:
  - name: Enabling nodejs
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: installing nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: creating system user
    ansible.builtin.user:
      name: roboshop
      home: /app
      shell: /sbin/nologin
      comment: roboshop system user

  - name: Deleting app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: Creating app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: deleting the code
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

  - name: downloading the code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

  - name: unarchive the file
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: creating catalogue service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: daemon reload the service file
    ansible.builtin.systemd_service:
      name: catalogue
      state: reloaded

  - name: copy mongo.repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: checking if products are loaded in db
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: db_output

  - name: print the db output
    ansible.builtin.debug:
      msg: "{{ db_output }}"

  - name: Load the products in db
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: db_output.stdout | int < 0

  - name: enable and restart the service
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes
    

  